[files]
extend-exclude = [
    "**/.git/**",
    "**/.idea/**",
    "**/node_modules/**",
    "**/dist/**",
    "**/build/**",
    "**/target/**",
    "**/vendor/**",
    "**/venv/**",
    "**/.venv/**",
    "**/.cache/**",
    "**/.turbo/**",
    "**/.vscode/**",
    "**/.next/**",
    "**/.nuxt/**",
    "**/*.lock",
    "**/__pycache__/**",
]
ignore-files = true
ignore-dot = true
ignore-vcs = true
ignore-hidden = false
ignore-global = false
ignore-parent = false

[default]
binary = false
check-filename = true
check-file = true
unicode = true
locale = "en-us"
extend-ignore-re = [
    "(?Rm)^.*(#|//)\\s*spellchecker:disable-line$",
    "(#|//)\\s*spellchecker:ignore-next-line\\n.*",
    "(?s)(#|//)\\s*spellchecker:off.*?\\n\\s*(#|//)\\s*spellchecker:on",
    "(?sm)^# ------------------------ >8 ------------------------$.*",
    "(?s)-----BEGIN PGP SIGNATURE-----.*?-----END PGP SIGNATURE-----",
]
extend-ignore-identifiers-re = [
    "\\bTLS_[A-Z0-9_]+(_anon_[A-Z0-9_]+)?\\b",
    "\\b[0-9a-f]{8,}\\b",
]
extend-ignore-words-re = [
    "^[A-Z]{1,3}$",
    "^[0-9]+$",
]

[type.lock]
extend-glob = ["**/*.lock"]
check-file = false
check-filename = false

[type.minified]
extend-glob = ["**/*.min.js", "**/*.min.css"]
check-file = false

[type.generated]
extend-glob = ["**/generated/**", "**/*.gen.*", "**/*.g.*"]
check-file = false

[default.extend-identifiers]
"DNS_ERROR_INVAILD_VIRTUALIZATION_INSTANCE_NAME" = "DNS_ERROR_INVAILD_VIRTUALIZATION_INSTANCE_NAME"
"ERROR_FILENAME_EXCED_RANGE" = "ERROR_FILENAME_EXCED_RANGE"
"ERROR_FILENAME_EXCEDE_RANGE" = "ERROR_FILENAME_EXCED_RANGE"
"INVAILD" = "INVALID"

[default.extend-words]
"widnows" = "windows"
