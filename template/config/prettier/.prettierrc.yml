useTabs: false

printWidth: 120
tabWidth: 2

semi: true
singleQuote: true
jsxSingleQuote: true
quoteProps: as-needed

endOfLine: lf
proseWrap: preserve
trailingComma: all
arrowParens: always

bracketSpacing: true
bracketSameLine: false

singleAttributePerLine: false
embeddedLanguageFormatting: auto

overrides:
  - files: ['*.yml', '*.yaml']
    options:
      tabWidth: 2

  - files: ['*.md', '*.mdx']
    options:
      embeddedLanguageFormatting: off
